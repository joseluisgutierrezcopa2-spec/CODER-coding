<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pase VIP | Justin Coachella</title>
    <link rel="stylesheet" href="../CSS/Bstyle.css">
</head>
<body>
    <div class="padre">
        <header>
            <table class="tabla-header">
                <tr>
                    <td class="logo"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6sJpL51XW4vE8p0-7vKMy7jF05N_nC-R4yQ&s" alt="Logo"></td>
                    <td class="titulo"><i>Experiencia VIP</i></td>
                </tr>
            </table>
        </header>

        <nav>
            <table class="tabla-menu">
                <tr>
                    <td><a href="../index.html" class="caja">Inicio</a></td>
                    <td><a href="biografia.html" class="caja">Biografía</a></td>
                    <td><a href="setlist.html" class="caja">Setlist</a></td>
                    <td><a href="galeria.html" class="caja">Galería</a></td>
                    <td><a href="merch.html" class="caja">Merch</a></td>
                    <td><a href="reserva-vip.html" class="caja">Pase VIP</a></td>
                    <td><a href="contacto.html" class="caja">Contacto</a></td>
                </tr>
            </table>
        </nav>

        <section class="contenido">
            <div class="subtitulo">
                <h2>Regístrate para el Sorteo VIP</h2>
            </div>

            <div class="formulario-contenedor">
                <form action="#" method="POST">
                    <table class="tabla-formulario">
                        <tr>
                            <td><label style="color: #ff9966; font-weight: bold;">Nombre del Belieber:</label></td>
                            <td><input type="text" name="nombre" placeholder="Tu nombre completo" required style="width: 95%; padding: 8px; border-radius: 5px; border: 1px solid #00f3ff;"></td>
                        </tr>
                        <tr>
                            <td><label style="color: #ff9966; font-weight: bold;">Correo Electrónico:</label></td>
                            <td><input type="email" name="correo" placeholder="ejemplo@correo.com" required style="width: 95%; padding: 8px; border-radius: 5px; border: 1px solid #00f3ff;"></td>
                        </tr>
                        <tr>
                            <td><label style="color: #ff9966; font-weight: bold;">Teléfono:</label></td>
                            <td><input type="tel" name="telefono" placeholder="+591 ..." required style="width: 95%; padding: 8px; border-radius: 5px; border: 1px solid #00f3ff;"></td>
                        </tr>
                        <tr>
                            <td><label style="color: #ff9966; font-weight: bold;">Paquete VIP:</label></td>
                            <td><select name="paquete" style="width: 98%; padding: 8px; border-radius: 5px;">
                                <option value="golden">Golden Circle (Cerca al escenario)</option>
                                <option value="backstage">Backstage Pass</option> 
                                <option value="meet">Meet & Greet (Digital)</option>
                            </select></td>
                        </tr>
                        <tr>
                            <td><label style="color: #ff9966; font-weight: bold;">Zona de Preferencia:</label></td>
                            <td style="color: white;">
                                <input type="radio" name="zona" value="norte"> Norte
                                <input type="radio" name="zona" value="sur"> Sur
                                <input type="radio" name="zona" value="general"> General
                            </td>
                        </tr>
                        <tr>
                            <td><label style="color: #ff9966; font-weight: bold;">Beneficios Extra:</label></td>
                            <td style="color: white;">
                                <input type="checkbox" name="extra" value="bebida"> Bebida Ilimitada
                                <input type="checkbox" name="extra" value="poster"> Poster Autografiado
                            </td>
                        </tr>
                        <tr>
                            <td><label style="color: #ff9966; font-weight: bold;">¿Por qué deberías ganar?</label></td>
                            <td><textarea name="motivo" placeholder="Cuéntanos tu historia como fan..." style="width: 95%; height: 80px; padding: 8px; border-radius: 5px; border: 1px solid #00f3ff;"></textarea></td>
                        </tr>
                        <tr>
                            <td colspan="2" style="text-align: center; padding-top: 20px;">
                                <button type="submit" style="background: linear-gradient(#ff007f, #9d00ff); color: white; border: none; padding: 12px 30px; cursor: pointer; border-radius: 25px; font-weight: bold; font-size: 16px; box-shadow: 0 0 10px #ff007f;">Enviar Registro</button>
                                <button type="reset" style="background: #333; color: white; border: none; padding: 12px 30px; cursor: pointer; border-radius: 25px; margin-left: 10px;">Limpiar</button>
                            </td>
                        </tr>
                    </table>
                </form>
            </div>
        </section>

        <footer>
            <h5>© 2026 Justin Coachella Fan Site</h5>
            <p>Diseño por Anahi Izurieta</p>
        </footer>
    </div>
</body>
</html>
